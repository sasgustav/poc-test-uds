services:
  postgres:
    image: postgres:16-alpine
    container_name: cobranca-postgres
    environment:
      POSTGRES_DB: cobranca_db
      POSTGRES_USER: cobranca_user
      POSTGRES_PASSWORD: cobranca_pass
    ports: ['5432:5432']
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cobranca_user -d cobranca_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jaeger:
    # Observabilidade opcional — ative o exporter via OTEL_ENABLED=true + OTEL_EXPORTER_OTLP_ENDPOINT
    image: jaegertracing/all-in-one:1.60
    container_name: cobranca-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686'   # UI
      - '4318:4318'     # OTLP HTTP
    restart: unless-stopped

  app:
    build:
      context: ./exercicio-1
      dockerfile: Dockerfile
    container_name: cobranca-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: cobranca_user
      DB_PASSWORD: cobranca_pass
      DB_DATABASE: cobranca_db
      DEFAULT_TIMEZONE: America/Sao_Paulo
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: regua-cobrancas
      CORS_ORIGINS: '*'
    ports: ['3000:3000']
    restart: unless-stopped

volumes:
  postgres_data:
